<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --text:#fff;
  --accent:#00f2ff;
}

.light{
  --bg:#ffffff;
  --text:#111;
  --accent:#0077ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition:.4s;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav button{
  background:var(--accent);
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#000428,#004e92);
  text-align:center;
}

.typing{
  font-size:2.5rem;
  border-right:3px solid;
  white-space:nowrap;
  overflow:hidden;
}

/* SKILLS */
.skills{
  padding:80px;
  background:linear-gradient(135deg,#1f1c2c,#928dab);
}

.skill{
  margin:20px 0;
}

.bar{
  height:10px;
  background:#333;
  border-radius:10px;
}

.fill{
  height:10px;
  background:var(--accent);
  width:0;
  border-radius:10px;
  transition:1s;
}

/* PROJECTS */
.projects{
  padding:80px;
  background:linear-gradient(135deg,#232526,#414345);
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  transition:.4s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:scale(1.05);
}

.card:hover .overlay{
  opacity:1;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transition:.4s;
}

/* TIMELINE */
.timeline{
  padding:80px;
  background:linear-gradient(135deg,#141e30,#243b55);
}

.timeline-item{
  margin:20px 0;
  border-left:3px solid var(--accent);
  padding-left:20px;
}

/* CONTACT */
.contact{
  padding:80px;
  background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216') center/cover;
}

.contact-form{
  background:rgba(0,0,0,0.7);
  padding:30px;
  border-radius:20px;
}

input, textarea{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:10px;
}

button.send{
  background:var(--accent);
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
}

/* BADGES */
.badges img{
  width:60px;
  margin:10px;
  transition:.3s;
}
.badges img:hover{
  transform:scale(1.2);
}
</style>
</head>

<body>

<nav>
  <h2>Your Name</h2>
  <button onclick="toggleTheme()">Toggle Mode</button>
</nav>

<section class="hero">
  <h1 class="typing" id="typing"></h1>
</section>

<section class="skills">
  <h2>Skills</h2>

  <div class="skill">
    HTML
    <div class="bar"><div class="fill" style="width:90%"></div></div>
  </div>

  <div class="skill">
    JavaScript
    <div class="bar"><div class="fill" style="width:85%"></div></div>
  </div>

</section>

<section class="projects">
  <div class="card">
    <h3>Project 1</h3>
    <div class="overlay">
      <p>🚀 Increased performance by 40%</p>
      <p>⚡ Reduced load time from 5s → 2s</p>
    </div>
  </div>

  <div class="card">
    <h3>Project 2</h3>
    <div class="overlay">
      <p>📈 Improved UX by 60%</p>
      <p>🔥 Increased conversions by 25%</p>
    </div>
  </div>
</section>

<section class="timeline">
  <h2>Experience</h2>

  <div class="timeline-item">
    <h3>Company 1</h3>
    <p>Built scalable system</p>
  </div>

  <div class="timeline-item">
    <h3>Company 2</h3>
    <p>Improved performance</p>
  </div>
</section>

<section class="badges">
  <h2>Companies</h2>
  <img src="https://logo.clearbit.com/google.com">
  <img src="https://logo.clearbit.com/amazon.com">
  <img src="https://logo.clearbit.com/oracle.com">
</section>

<section id="contact">
  <h2>Contact Me</h2>

  <form action="https://formspree.io/f/mwvnddkd" method="POST" class="contact-form">

    <div class="input-group">
      <input type="text" name="name" required>
      <label>Name</label>
    </div>

    <div class="input-group">
      <input type="email" name="email" required>
      <label>Email</label>
    </div>

    <div class="input-group">
      <textarea name="message" rows="4" required></textarea>
      <label>Message</label>
    </div>

    <input type="hidden" name="_subject" value="New Portfolio Message 🚀">

    <button type="submit" class="send-btn">Send Message</button>

  </form>
</section>

<script>
/* Typing Animation */
const text = "Hi, I'm a Developer 🚀";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,100);
  }
}
typing();

/* Theme Toggle */
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}

window.onload=()=>{
  if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
  }
}
</script>

</body>
</html>
