<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhavin Kumar | Elite Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
:root{
  --bg:#020617;
  --text:#e5e7eb;
  --accent:#6366f1;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* CANVAS BACKGROUND */
#bgCanvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.typing{
  font-size:3rem;
}

/* PROJECT CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  margin:20px;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  background:#111;
  padding:30px;
  border-radius:20px;
  max-width:500px;
}

/* CONTACT */
form{
  margin-top:40px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
}

/* SECTION */
section{
  padding:80px 10%;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<section class="hero">
  <h1 class="typing" id="typing"></h1>
  <p>Oracle Fusion HCM | OTBI | Redwood | HSDL</p>
</section>

<section>
  <h2>Projects</h2>

  <div class="card" onclick="openModal('LLUH Project','Improved reporting efficiency by delivering OTBI & BIP reports. Reduced manual work.')">
    LLUH Cloud Project
  </div>

  <div class="card" onclick="openModal('Just Energy','Implemented Redwood UI. Improved UX and reduced navigation complexity.')">
    Just Energy Project
  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<section>
  <h2>Contact</h2>

  <form action="https://formspree.io/f/mwvnddkd" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<script>
/* TYPING */
const roles=[
"Oracle Fusion HCM Analyst",
"Redwood UI Developer",
"OTBI & BIP Specialist"
];

let i=0,j=0,current="",del=false;

function type(){
  let el=document.getElementById("typing");

  if(i<roles.length){
    if(!del && j<=roles[i].length){
      current=roles[i].substring(0,j++);
    }else if(del && j>=0){
      current=roles[i].substring(0,j--);
    }

    el.textContent=current;

    if(j===roles[i].length) del=true;
    if(j===0 && del){ del=false; i++; }
  } else i=0;

  setTimeout(type,80);
}
type();

/* MODAL */
function openModal(title,text){
  document.getElementById("modal").classList.add("active");
  document.getElementById("modalTitle").innerText=title;
  document.getElementById("modalText").innerText=text;
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

/* ANALYTICS (basic) */
fetch("https://api.countapi.xyz/hit/bhavin-portfolio/visits");

/* THREE JS PARTICLES */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bgCanvas'),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

const particlesGeometry=new THREE.BufferGeometry();
const count=1000;

const positions=new Float32Array(count*3);

for(let i=0;i<count*3;i++){
  positions[i]=(Math.random()-0.5)*5;
}

particlesGeometry.setAttribute('position',new THREE.BufferAttribute(positions,3));

const particlesMaterial=new THREE.PointsMaterial({
  size:0.01,
  color:0x6366f1
});

const particles=new THREE.Points(particlesGeometry,particlesMaterial);
scene.add(particles);

camera.position.z=2;

function animate(){
  requestAnimationFrame(animate);
  particles.rotation.y+=0.0005;
  renderer.render(scene,camera);
}

animate();

/* RESIZE */
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
