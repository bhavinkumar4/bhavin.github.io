<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0a;
  --text: #ffffff;
  --accent: linear-gradient(135deg, #7f5af0, #2cb67d);
}

body.light {
  --bg: #f5f5f5;
  --text: #111;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.4s;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  backdrop-filter: blur(20px);
  z-index: 1000;
}

nav h1 {
  font-size: 18px;
}

.toggle {
  cursor: pointer;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
  background: radial-gradient(circle at top, #1a1a2e, #000);
}

.hero h2 {
  font-size: 60px;
  background: var(--accent);
  -webkit-background-clip: text;
  color: transparent;
}

/* PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* SECTIONS */
.section {
  padding: 100px 10%;
}

.projects {
  background: linear-gradient(135deg, #0f2027, #203a43);
}

/* CONTACT SECTION (UPDATED PREMIUM) */
.contact {
  background: linear-gradient(135deg, #232526, #414345);
}

.contact-wrapper {
  display: flex;
  gap: 40px;
  align-items: center;
  flex-wrap: wrap;
}

.contact-image {
  flex: 1;
  min-width: 300px;
  height: 400px;
  border-radius: 20px;
  background: url('https://images.unsplash.com/photo-1556740738-b6a63e27c4df') center/cover;
  position: relative;
  overflow: hidden;
}

.contact-image::after {
  content: "Recruiters reaching out 📞";
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.6);
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
}

/* FORM */
.contact-form {
  flex: 1;
  min-width: 300px;
  max-width: 500px;
}

.input-group {
  position: relative;
  margin: 20px 0;
}

input, textarea {
  width: 100%;
  padding: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid #555;
  color: white;
  border-radius: 10px;
}

button {
  padding: 12px 20px;
  background: var(--accent);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 10px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* METRICS */
.metrics {
  display: flex;
  gap: 20px;
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: #111;
  padding: 30px;
  border-radius: 20px;
  transition: 0.4s;
}

.popup.active {
  transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
  <h1>Your Name</h1>
  <div class="toggle" onclick="toggleMode()">🌗</div>
</nav>

<section class="hero">
  <h2 id="typing"></h2>
  <p>Oracle HCM | Developer | Problem Solver</p>
</section>

<section class="section projects">
  <h2>Projects</h2>
  
  <div class="card" onclick="openPopup()">
    <h3>Oracle Report Optimization</h3>
    <p>Hover / Click to view case study</p>
  </div>

  <div class="metrics">
    <div>⚡ 70% Faster</div>
    <div>📉 40% Cost Reduced</div>
  </div>
</section>

<!-- UPDATED CONTACT -->
<section class="section contact">
  <h2>Contact</h2>

  <div class="contact-wrapper">
    
    <div class="contact-image"></div>

    <form action="https://formspree.io/f/mwvnddkd" method="POST" class="contact-form">
      <div class="input-group">
        <input type="text" name="name" required placeholder="Your Name">
      </div>

      <div class="input-group">
        <input type="email" name="email" required placeholder="Your Email">
      </div>

      <div class="input-group">
        <textarea name="message" required placeholder="Your Message"></textarea>
      </div>

      <input type="hidden" name="_subject" value="Portfolio Message 🚀">

      <button type="submit">Send Message</button>
    </form>

  </div>
</section>

<div class="popup" id="popup">
  <h2>Case Study</h2>
  <p><b>Before:</b> Slow report (15s)</p>
  <p><b>After:</b> Optimized (4s)</p>
  <button onclick="closePopup()">Close</button>
</div>

<script>
// DARK MODE
function toggleMode() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

if(localStorage.getItem("theme") === "light"){
  document.body.classList.add("light");
}

// TYPING EFFECT
const text = "Hi, I'm a Premium Developer 🚀";
let i = 0;
function type() {
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 50);
  }
}
type();

// POPUP
function openPopup(){
  document.getElementById("popup").classList.add("active");
}
function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
