<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bhavin | Ultra Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* GLOW CURSOR */
.cursor {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  position: fixed;
  background: rgba(0, 113, 227, 0.8);
  box-shadow: 0 0 20px #0071e3, 0 0 40px #0071e3;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 20px 60px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.03);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 80px;
}

.hero h1 {
  font-size: 72px;
  background: linear-gradient(270deg, #fff, #888, #fff);
  background-size: 400% 400%;
  animation: gradientMove 6s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

@keyframes gradientMove {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

.hero p {
  margin-top: 20px;
  color: #aaa;
}

/* BUTTON */
.btn {
  margin-top: 30px;
  padding: 14px 28px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #0071e3, #00c6ff);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTION */
.section {
  padding: 120px 80px;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
}

.card {
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.05);
}

footer {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>
</head>

<body>

<div class="cursor"></div>

<nav>
  <h2>Bhavin</h2>
</nav>

<section class="hero">
  <h1>Next-Level Digital Experience</h1>
  <p>Premium UI. Smooth motion. Elite performance.</p>
  <button class="btn">Explore</button>
</section>

<section class="section">
  <div class="cards">
    <div class="card">⚡ Performance</div>
    <div class="card">🎯 Precision</div>
    <div class="card">🚀 Innovation</div>
  </div>
</section>

<footer>
  © 2026 Bhavin
</footer>

<script>
/* CUSTOM CURSOR */
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", e => {
  cursor.style.top = e.clientY + "px";
  cursor.style.left = e.clientX + "px";
});

/* SCROLL REVEAL */
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
