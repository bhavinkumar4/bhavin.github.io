<style>
    /* New Premium Styles */
    html { scroll-behavior: smooth; }
    
    .skills-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
    }

    @media (max-width: 768px) { .skills-grid { grid-template-columns: 1fr; } }

    .skill-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;

        font-size: 0.9rem;

        height: 6px;
        background: var(--glass-border);

    }

        background: var(--accent);
        border-radius: 10px;
        transition: width 1.5s cubic-bezier(0.1, 0, 0.2, 1);
    }

    /* Experience Timeline Dot Styling */
    .card::after {
        content: "";
        position: absolute;
        left: -15px;
        top: 45px;
        width: 10px;
        height: 10px;
        background: var(--primary);
        border-radius: 50%;
        box-shadow: 0 0 15px var(--primary);
    }
</style>
